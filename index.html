<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KADEORA</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: #f5f5f5;
    }

    @font-face {
      font-family: 'Kadeora';
      src: url('./Kadeora.woff2') format('woff2');
    }

    .page {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    .output {
      position: absolute;
      inset: 0;
      background: #fff;
      overflow-y: auto;
      padding: 20px 80px 140px 80px;
    }

    .output-text {
      color: #000;
      font-family: 'Kadeora', sans-serif;
      font-size: clamp(28px, 3vw, 48px);
      line-height: 1.1;
      letter-spacing: 0;
      word-spacing: 0;
      text-align: left;
      white-space: pre-wrap;
      word-break: normal;
      overflow-wrap: normal;
    }

    .composer-wrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0 clamp(24px, 8vw, 120px) 20px;
      pointer-events: none;
    }

    .composer {
      width: min(100%, 920px);
      margin: 0 auto;
      min-height: 52px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 24px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .text-input {
      flex: 1;
      min-height: 24px;
      max-height: 180px;
      border: none;
      outline: none;
      background: transparent;
      resize: none;
      overflow-y: auto;
      font: inherit;
      font-size: 16px;
      line-height: 1.5;
      color: #000;
    }

    .text-input::placeholder {
      color: rgba(0, 0, 0, 0.35);
    }

    .send-button {
      flex-shrink: 0;
      border: none;
      background: #000;
      padding: 8px 14px;
      font-size: 14px;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 999px;
    }
    .send-button:hover {
      background: #333;
      }

  </style>
</head>
<body>
  <main class="page">
    <section class="output" id="output">
      <div class="output-text" id="outputText"></div>
    </section>

    <section class="composer-wrap">
      <div class="composer">
        <textarea class="text-input" placeholder="텍스트를 입력하세요."></textarea>
        <button class="send-button" type="button">전송</button>
      </div>
    </section>
  </main>

  <script>
    const input = document.querySelector('.text-input');
    const button = document.querySelector('.send-button');
    const output = document.getElementById('output');
    const outputText = document.getElementById('outputText');
    const composer = document.querySelector('.composer');

    let isComposing = false;

    input.addEventListener('compositionstart', () => {
      isComposing = true;
    });

    input.addEventListener('compositionend', () => {
      isComposing = false;
    });

    function updateOutputPadding() {
      const composerHeight = composer.offsetHeight;
      output.style.paddingBottom = `${composerHeight + 40}px`;
    }

    function autoResize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 180) + 'px';
      updateOutputPadding();
    }

    input.addEventListener('input', autoResize);

    function sendText() {
      const text = input.value.trim();
      if (!text) return;

      if (outputText.textContent !== '') {
        outputText.textContent += ' ';
      }

      outputText.textContent += text;

      input.value = '';
      input.style.height = 'auto';
      updateOutputPadding();

      output.scrollTop = output.scrollHeight;
    }

    button.addEventListener('click', sendText);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        if (isComposing || e.isComposing) return;
        e.preventDefault();
        sendText();
      }
    });

    window.addEventListener('load', updateOutputPadding);
    window.addEventListener('resize', updateOutputPadding);
  </script>
</body>
</html>
